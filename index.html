<!doctype html>
// God bless
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rasterization</title>
  </head>
  <body>
    <div id="app">
      <div id="app-container">
        <canvas id="webgpu-canvas"></canvas>
        
        <div id="sidebar">
          <div id="mainMenu">
            <button id="menuLoadPoints">Load Points</button>
            <button id="menuLoadCameras">Load Cameras</button>
            <button id="menuClean" style="display: none;">Clean</button>
          </div>
          
          <div id="pointsMenu" style="display: none;">
            <button id="menuBackPoints">Back</button>
            <button id="loadPointsBtn">Choose .json or .bin</button>
            <input type="file" id="pointsFileInput" accept=".json,.bin" style="display: none;">
          </div>
          
          <div id="camerasMenu" style="display: none;">
            <button id="menuBackCameras">Back</button>
            <button id="loadCamerasBtn">Choose cameras.json</button>
            <input type="file" id="camerasFileInput" accept=".json" style="display: none;">
          </div>
        </div>
      </div>

      <div id="trainingControls" style="display: none;">
        <button id="prevBtn">Prev</button>
        <span id="counterValue">0</span>
        <button id="nextBtn">Next</button>
        <button id="trainingToggleBtn">Train</button>
        <button id="autoTrainBtn">Auto: OFF</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
